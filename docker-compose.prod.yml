version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pulse_postgres_prod
    environment:
      POSTGRES_DB: pulse_db
      POSTGRES_USER: pulse_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}  # Set via environment variable
      POSTGRES_INITDB_ARGS: "-E UTF8"
    ports:
      - "5433:5432"
    volumes:
      - pulse_postgres_data:/var/lib/postgresql/data
    networks:
      - pulse_network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse_user -d pulse_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pulse_app:
    build:
      context: .
      dockerfile: Dockerfile
    image: pulse:latest
    container_name: pulse_app_prod
    environment:
      # Database connection
      DATABASE_URL: postgresql://pulse_user:${POSTGRES_PASSWORD}@postgres:5432/pulse_db
      
      # External Services
      ENABLE_EXTERNAL_SERVICES: ${ENABLE_EXTERNAL_SERVICES:-false}
      
      # API Keys (must be set via environment variables)
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      
      # Service URLs
      GENESIS_SERVICE_URL: ${GENESIS_SERVICE_URL:-http://genesis:8001}
      ORBIT_SERVICE_URL: ${ORBIT_SERVICE_URL:-http://orbit:8002}
    ports:
      - "8003:8003"
    networks:
      - pulse_network
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    command: >
      sh -c "
        echo 'Running database migrations...' &&
        alembic upgrade head &&
        echo 'Starting PULSE application...' &&
        uvicorn main:app --host 0.0.0.0 --port 8003 --workers 4
      "

networks:
  pulse_network:
    name: pulse_network
    driver: bridge

volumes:
  pulse_postgres_data:
    name: pulse_postgres_data
